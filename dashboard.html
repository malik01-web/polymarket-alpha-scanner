
<!DOCTYPE html>
<html>
<head>
<title>Alpha Terminal Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>Market Scanner</h1>

<div class="controls">
<input id="search" placeholder="Search markets">
<select id="category">
<option value="all">All</option>
<option value="crypto">Crypto</option>
<option value="politics">Politics</option>
<option value="sports">Sports</option>
</select>
</div>

<div class="panel">
<h3>Top Alpha Signals</h3>
<div id="signals"></div>
</div>

<div class="panel">
<h3>Markets</h3>
<table>
<thead>
<tr>
<th>Market</th>
<th>Market Prob</th>
<th>AI Prob</th>
<th>Edge</th>
<th>Rank</th>
</tr>
</thead>
<tbody id="markets"></tbody>
</table>
</div>

<div class="panel">
<h3>Probability Chart</h3>
<canvas id="probChart"></canvas>
</div>

<script src="js/dashboard.js"></script>
<script src="js/predictionModel.js"></script>
<script src="js/rankingEngine.js"></script>
<script src="js/filter.js"></script>

</body>
</html>
